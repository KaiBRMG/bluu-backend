<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #002333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-top-color: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      opacity: 0;
      animation: spin 0.75s linear infinite, fadeIn 0.4s ease 0.2s forwards;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <img class="logo" src="./public/logo/icon.ico" alt="" draggable="false" />
  <div class="spinner"></div>
</body>
</html>
