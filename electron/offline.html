<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #002333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      width: 64px; height: 64px;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo { margin-bottom: 28px; }
    h1 { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 24px; max-width: 320px; text-align: center; line-height: 1.5; }
    button {
      -webkit-app-region: no-drag;
      background: #1e3a4a; color: #e2e8f0;
      border: 1px solid #2a4a5c; border-radius: 8px;
      padding: 8px 20px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
      transition: background 0.15s ease;
    }
    button:hover { background: #26485a; }
    .retrying { margin-top: 16px; font-size: 0.72rem; color: #64748b; opacity: 0; transition: opacity 0.2s; }
    .retrying.show { opacity: 1; }
  </style>

  <h1>Cannot reach Bluu Backend</h1>
  <p>You appear to be offline, or the app is temporarily unavailable. It will keep retrying automatically.</p>
  <button id="retry">Try again</button>
  <div class="retrying" id="retrying">Reconnecting…</div>
  <script>
    const btn = document.getElementById("retry");
    const status = document.getElementById("retrying");
    btn.addEventListener("click", () => {
      status.classList.add("show");
      window.electronAPI && window.electronAPI.app && window.electronAPI.app.retryLoad && window.electronAPI.app.retryLoad();
    });
    // Reflect the automatic backoff retry.
    window.addEventListener("online", () => {
      status.classList.add("show");
      window.electronAPI && window.electronAPI.app && window.electronAPI.app.retryLoad && window.electronAPI.app.retryLoad();
    });
  </script>
